<?xml version="1.0" encoding="UTF-8"?>
<svg width="250" height="60" viewBox="0 0 250 60" version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <title>LuminaWeb - Modern Logo</title>
    <defs>
        <linearGradient x1="0%" y1="50%" x2="100%" y2="50%" id="goldGradient">
            <stop stop-color="#f59e0b" offset="0%"></stop> <stop stop-color="#d4af37" offset="100%"></stop> </linearGradient>
    </defs>
    
    <g stroke="none" stroke-width="1" fill="none" fill-rule="evenodd">
        <g transform="translate(0, 5)">
            <path d="M15,10 L5,25 L15,40" stroke="url(#goldGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
            <path d="M35,10 L45,25 L35,40" stroke="url(#goldGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></path>
            
            <path d="M25,5 L20,22 L30,28 L25,45" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>
            
            <text font-family="Inter, sans-serif" font-size="36" font-weight="800" letter-spacing="1" fill="#FFFFFF">
                <tspan x="60" y="35">Lumina</tspan><tspan fill="url(#goldGradient)">Web</tspan>
            </text>
        </g>
    </g>
</svg>